<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>猜歌名 - 微信小程序版</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'spin-slow': 'spin 8s linear infinite',
            'bounce': 'bounce 1s infinite',
            'fadeIn': 'fadeIn 0.3s ease-out',
            'popIn': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            popIn: {
              '0%': { opacity: '0', transform: 'scale(0.8)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Utility for hiding scrollbars */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    body { 
      -webkit-font-smoothing: antialiased; 
      -moz-osx-font-smoothing: grayscale; 
      background-color: #f3f4f6; /* slate-100 */
    }
    
    /* iOS Safe Area Support */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
  
  <!-- Babel for compiling JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map for Modules -->
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Settings, Users, Music, Clock, Play, Zap, LogIn, X, 
      Pause, RotateCcw, Check, Eye, ArrowRight, Lock, 
      Send, Share2, PlayCircle, Mic, Crown, LogOut, 
      Trophy, Home 
    } from 'lucide-react';

    // --- 1. Enums & Constants (from types.ts & constants.ts) ---
    
    const GameMode = {
      LOCAL: 'LOCAL',
      ONLINE: 'ONLINE'
    };

    const PlaybackPosition = {
      RANDOM: 'RANDOM',
      START: 'START'
    };

    const ARTISTS = [
      { id: '1', name: '周杰伦', avatar: 'https://picsum.photos/seed/jay/100/100' },
      { id: '2', name: '陈奕迅', avatar: 'https://picsum.photos/seed/eason/100/100' },
      { id: '3', name: '邓紫棋', avatar: 'https://picsum.photos/seed/gem/100/100' },
      { id: '4', name: '林俊杰', avatar: 'https://picsum.photos/seed/jj/100/100' },
    ];

    const SONGS = [
      { id: '101', title: '晴天', artistId: '1', cover: 'https://picsum.photos/seed/s1/200/200' },
      { id: '102', title: '夜曲', artistId: '1', cover: 'https://picsum.photos/seed/s2/200/200' },
      { id: '103', title: '稻香', artistId: '1', cover: 'https://picsum.photos/seed/s3/200/200' },
      { id: '201', title: '十年', artistId: '2', cover: 'https://picsum.photos/seed/s4/200/200' },
      { id: '202', title: '红玫瑰', artistId: '2', cover: 'https://picsum.photos/seed/s5/200/200' },
      { id: '203', title: '单车', artistId: '2', cover: 'https://picsum.photos/seed/s6/200/200' },
      { id: '301', title: '泡沫', artistId: '3', cover: 'https://picsum.photos/seed/s7/200/200' },
      { id: '302', title: '光年之外', artistId: '3', cover: 'https://picsum.photos/seed/s8/200/200' },
      { id: '401', title: '不为谁而作的歌', artistId: '4', cover: 'https://picsum.photos/seed/s9/200/200' },
      { id: '402', title: '小酒窝', artistId: '4', cover: 'https://picsum.photos/seed/s10/200/200' },
    ];

    // --- 2. Shared Components (Visualizer) ---

    const Visualizer = ({ isPlaying }) => {
      return (
        <div className="flex justify-center items-end h-16 space-x-1 my-4">
          {[...Array(8)].map((_, i) => (
            <div
              key={i}
              className={`w-2 bg-green-500 rounded-t-sm transition-all duration-150 ease-in-out ${
                isPlaying ? 'animate-pulse' : 'h-1'
              }`}
              style={{
                height: isPlaying ? `${Math.random() * 100}%` : '4px',
                animationDelay: `${i * 0.1}s`,
                animationDuration: '0.6s'
              }}
            />
          ))}
        </div>
      );
    };

    // --- 3. Screen Components ---

    // SetupScreen
    const SetupScreen = ({ settings, setSettings, onStart, onJoin, maxSongs }) => {
      const [showJoinModal, setShowJoinModal] = useState(false);
      const [roomId, setRoomId] = useState('');
      
      const toggleArtist = (id) => {
        setSettings(prev => {
          const exists = prev.selectedArtistIds.includes(id);
          let newSelection = exists 
            ? prev.selectedArtistIds.filter(a => a !== id)
            : [...prev.selectedArtistIds, id];
          
          if (newSelection.length === 0) newSelection = [id]; 
          
          return { ...prev, selectedArtistIds: newSelection };
        });
      };

      const handleJoinSubmit = () => {
        if (roomId.length >= 4) {
          onJoin(roomId);
          setShowJoinModal(false);
        } else {
          alert("请输入有效的房间号");
        }
      };

      return (
        <div className="flex flex-col h-full bg-white font-sans text-slate-800 relative">
          
          {/* Header */}
          <div className="pt-8 pb-4 px-6">
            <div className="flex justify-between items-center mb-2">
              <h1 className="text-3xl font-black text-slate-900 tracking-tight">
                听歌<span className="text-green-500">猜名</span>
              </h1>
              <button 
                onClick={() => setShowJoinModal(true)}
                className="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 px-4 py-2 rounded-full font-bold text-sm transition-transform active:scale-95 flex items-center gap-1"
              >
                 <LogIn size={16} className="text-yellow-600"/> 加入房间
              </button>
            </div>
            <p className="text-slate-400 font-medium text-sm">选择你的游戏模式 ✨</p>
          </div>

          <div className="flex-1 overflow-y-auto px-4 pb-28 space-y-6 no-scrollbar">
            
            {/* Mode Selection */}
            <section>
              <div className="flex gap-4">
                <button
                  onClick={() => setSettings({ ...settings, mode: GameMode.LOCAL })}
                  className={`flex-1 p-4 rounded-3xl transition-all duration-300 border-b-4 active:scale-95 ${
                    settings.mode === GameMode.LOCAL 
                      ? 'bg-green-500 text-white border-green-700 shadow-green-200 shadow-xl' 
                      : 'bg-slate-100 text-slate-400 border-slate-200'
                  }`}
                >
                  <div className="flex flex-col items-center gap-2">
                    <div className={`p-3 rounded-full ${settings.mode === GameMode.LOCAL ? 'bg-white/20' : 'bg-white'}`}>
                       <Users size={24} className={settings.mode === GameMode.LOCAL ? 'text-white' : 'text-slate-400'} />
                    </div>
                    <span className="font-bold text-lg">本地同玩</span>
                  </div>
                </button>
                <button
                  onClick={() => setSettings({ ...settings, mode: GameMode.ONLINE })}
                  className={`flex-1 p-4 rounded-3xl transition-all duration-300 border-b-4 active:scale-95 ${
                    settings.mode === GameMode.ONLINE 
                      ? 'bg-blue-500 text-white border-blue-700 shadow-blue-200 shadow-xl' 
                      : 'bg-slate-100 text-slate-400 border-slate-200'
                  }`}
                >
                   <div className="flex flex-col items-center gap-2">
                    <div className={`p-3 rounded-full ${settings.mode === GameMode.ONLINE ? 'bg-white/20' : 'bg-white'}`}>
                       <Zap size={24} className={settings.mode === GameMode.ONLINE ? 'text-white' : 'text-slate-400'} />
                    </div>
                    <span className="font-bold text-lg">线上联机</span>
                  </div>
                </button>
              </div>
            </section>

            {/* Artist Selection */}
            <section className="bg-slate-50 p-5 rounded-[2rem]">
              <h2 className="text-slate-700 font-bold mb-4 flex items-center gap-2 text-lg">
                <Music className="text-pink-500" size={20} /> 谁的歌?
              </h2>
              <div className="grid grid-cols-2 gap-3">
                {ARTISTS.map(artist => (
                  <div 
                    key={artist.id}
                    onClick={() => toggleArtist(artist.id)}
                    className={`relative flex items-center gap-3 p-3 rounded-2xl cursor-pointer transition-all border-2 ${
                      settings.selectedArtistIds.includes(artist.id)
                        ? 'bg-white border-pink-400 shadow-md scale-[1.02]'
                        : 'bg-white border-transparent opacity-60 hover:opacity-100'
                    }`}
                  >
                    <img src={artist.avatar} alt={artist.name} className="w-10 h-10 rounded-full object-cover shadow-sm bg-slate-200" />
                    <span className="font-bold text-slate-700">{artist.name}</span>
                    {settings.selectedArtistIds.includes(artist.id) && (
                      <div className="absolute -top-1 -right-1 w-4 h-4 bg-pink-500 rounded-full border-2 border-white"></div>
                    )}
                  </div>
                ))}
              </div>
            </section>

            {/* Settings */}
            <section className="space-y-4">
               <div className="bg-slate-50 p-5 rounded-[2rem]">
                  <h2 className="text-slate-700 font-bold mb-4 flex items-center gap-2 text-lg">
                    <Settings className="text-purple-500" size={20} /> 难度设置
                  </h2>
                  
                  <div className="space-y-6">
                    <div>
                       <div className="flex justify-between mb-2">
                          <span className="text-sm font-bold text-slate-500">播放时长</span>
                          <div className="flex items-center gap-2 bg-white px-3 py-1 rounded-full shadow-sm">
                            <span className="text-xs font-bold text-slate-400">整首?</span>
                            <div 
                              onClick={() => setSettings({...settings, isFullSong: !settings.isFullSong})}
                              className={`w-8 h-5 rounded-full p-1 cursor-pointer transition-colors ${settings.isFullSong ? 'bg-green-500' : 'bg-slate-300'}`}
                            >
                               <div className={`w-3 h-3 bg-white rounded-full shadow-sm transition-transform ${settings.isFullSong ? 'translate-x-3' : ''}`}></div>
                            </div>
                          </div>
                       </div>
                       {!settings.isFullSong && (
                         <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                            <input
                              type="range"
                              min="2"
                              max="30"
                              value={settings.durationSeconds}
                              onChange={(e) => setSettings({...settings, durationSeconds: parseInt(e.target.value)})}
                              className="w-full h-3 bg-slate-200 rounded-full appearance-none accent-purple-500"
                            />
                            <div className="flex justify-between mt-2">
                              <span className="text-xs font-bold text-slate-400">2s</span>
                              <span className="text-sm font-black text-purple-500">{settings.durationSeconds} 秒</span>
                              <span className="text-xs font-bold text-slate-400">30s</span>
                            </div>
                         </div>
                       )}
                    </div>

                    <div>
                      <span className="text-sm font-bold text-slate-500 block mb-3">从哪里开始听?</span>
                      <div className="flex bg-slate-200 p-1 rounded-2xl">
                        <button
                          onClick={() => setSettings({...settings, playbackPosition: PlaybackPosition.RANDOM})}
                          className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${
                            settings.playbackPosition === PlaybackPosition.RANDOM 
                            ? 'bg-white text-slate-800 shadow-sm' 
                            : 'text-slate-500'
                          }`}
                        >
                          🎲 随机片段
                        </button>
                        <button
                          onClick={() => setSettings({...settings, playbackPosition: PlaybackPosition.START})}
                          className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${
                            settings.playbackPosition === PlaybackPosition.START 
                            ? 'bg-white text-slate-800 shadow-sm' 
                            : 'text-slate-500'
                          }`}
                        >
                          ⏮️ 从头开始
                        </button>
                      </div>
                    </div>
                  </div>
               </div>

               <div className="bg-slate-50 p-5 rounded-[2rem]">
                  <h2 className="text-slate-700 font-bold mb-4 flex items-center gap-2 text-lg">
                    <Clock className="text-orange-500" size={20} /> 规则
                  </h2>
                  
                  <div className="mb-4">
                     <div className="flex justify-between items-center mb-2">
                        <span className="text-sm font-bold text-slate-500">题目数量</span>
                        <span className="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold">{settings.questionCount} 首</span>
                     </div>
                     <input
                        type="range"
                        min="1"
                        max={maxSongs}
                        value={settings.questionCount}
                        onChange={(e) => setSettings({...settings, questionCount: parseInt(e.target.value)})}
                        className="w-full h-3 bg-slate-200 rounded-full appearance-none accent-orange-500"
                     />
                  </div>

                  <div>
                    <span className="text-sm font-bold text-slate-500 block mb-3">答题限时</span>
                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                       {[5, 10, 15, 30, 60, 0].map(sec => (
                         <button
                           key={sec}
                           onClick={() => setSettings({...settings, timeLimit: sec})}
                           className={`flex-shrink-0 px-4 py-2 rounded-2xl font-bold text-sm border-2 transition-all ${
                             settings.timeLimit === sec 
                             ? 'bg-orange-500 border-orange-500 text-white shadow-lg shadow-orange-200' 
                             : 'bg-white border-slate-200 text-slate-400'
                           }`}
                         >
                           {sec === 0 ? '♾️ 无限' : `${sec}s`}
                         </button>
                       ))}
                    </div>
                  </div>
               </div>
            </section>
          </div>

          <div className="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-white via-white to-transparent z-10 max-w-md mx-auto right-0">
            <button 
              onClick={onStart}
              className="w-full bg-slate-900 text-white font-bold py-5 rounded-[2rem] shadow-xl flex items-center justify-center gap-3 text-xl active:scale-95 transition-transform hover:bg-slate-800"
            >
              <Play size={24} fill="currentColor" /> 
              {settings.mode === GameMode.LOCAL ? '开始本地游戏' : '创建房间'}
            </button>
          </div>

          {/* Join Modal */}
          {showJoinModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fadeIn">
              <div className="bg-white w-full max-w-sm p-6 rounded-[2rem] shadow-2xl scale-100 animate-popIn relative">
                <button 
                  onClick={() => setShowJoinModal(false)}
                  className="absolute top-4 right-4 p-2 bg-slate-100 rounded-full text-slate-400 hover:bg-slate-200"
                >
                  <X size={20} />
                </button>
                
                <div className="text-center mb-6">
                  <div className="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <LogIn className="text-yellow-500" size={32} />
                  </div>
                  <h2 className="text-2xl font-black text-slate-800">加入游戏</h2>
                  <p className="text-slate-500 mt-1">请输入好友分享的房间号</p>
                </div>

                <input
                  type="text"
                  value={roomId}
                  onChange={(e) => setRoomId(e.target.value)}
                  placeholder="例如: 8821"
                  maxLength={6}
                  className="w-full bg-slate-100 text-center text-3xl font-black tracking-widest py-4 rounded-2xl mb-4 focus:outline-none focus:ring-4 focus:ring-yellow-200 text-slate-800 placeholder-slate-300"
                  autoFocus
                />

                <button
                  onClick={handleJoinSubmit}
                  className="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95"
                >
                  进入房间 🚀
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // LocalGameScreen
    const LocalGameScreen = ({
      settings,
      players,
      setPlayers,
      currentSong,
      songIndex,
      totalSongs,
      onNextSong,
      onEndGame
    }) => {
      const [gameState, setGameState] = useState('standby');
      const [isPlaying, setIsPlaying] = useState(false);
      const [progress, setProgress] = useState(0);
      const [isRevealed, setIsRevealed] = useState(false);
      const [roundScoresRecorded, setRoundScoresRecorded] = useState({});
      
      const [hasFinishedFirstPlay, setHasFinishedFirstPlay] = useState(false);
      const [countdown, setCountdown] = useState(0);
      const [isCountingDown, setIsCountingDown] = useState(false);

      const timerRef = useRef(null);
      const countdownRef = useRef(null);
      const maxDuration = settings.isFullSong ? 180 : settings.durationSeconds; 

      useEffect(() => {
        if (songIndex === 0 && gameState === 'standby') {
          // Stay in standby
        } else {
          setGameState('playing');
        }
        
        setIsPlaying(true); 
        setProgress(0);
        setIsRevealed(false);
        setRoundScoresRecorded({});
        
        setHasFinishedFirstPlay(false);
        setIsCountingDown(false);
        setCountdown(settings.timeLimit > 0 ? settings.timeLimit : 0);
        
        stopTimer();
        stopCountdown();
      }, [currentSong]);

      useEffect(() => {
        if (isPlaying) {
          timerRef.current = window.setInterval(() => {
            setProgress((prev) => {
              if (prev >= maxDuration) {
                handlePlaybackFinish();
                return maxDuration;
              }
              return prev + 0.1;
            });
          }, 100);
        } else {
          stopTimer();
        }
        return () => stopTimer();
      }, [isPlaying, maxDuration]);

      useEffect(() => {
        if (isCountingDown && countdown > 0) {
          countdownRef.current = window.setInterval(() => {
            setCountdown((prev) => {
              if (prev <= 1) {
                stopCountdown();
                setIsCountingDown(false);
                setIsRevealed(true); 
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        } else {
          stopCountdown();
        }
        return () => stopCountdown();
      }, [isCountingDown, countdown]);

      const stopTimer = () => {
        if (timerRef.current) clearInterval(timerRef.current);
      };

      const stopCountdown = () => {
        if (countdownRef.current) clearInterval(countdownRef.current);
      };

      const handlePlaybackFinish = () => {
        setIsPlaying(false);
        
        if (!hasFinishedFirstPlay) {
          setHasFinishedFirstPlay(true);
          if (settings.timeLimit > 0) {
            setIsCountingDown(true);
          }
        }
      };

      const togglePlay = () => {
        setIsPlaying(!isPlaying);
      };

      const handleReplay = () => {
        if (!hasFinishedFirstPlay) return;
        setProgress(0);
        setIsPlaying(true);
      };

      const handleSliderChange = (e) => {
        if (!hasFinishedFirstPlay) return;
        setProgress(parseFloat(e.target.value));
      };

      const handleScore = (playerId, correct) => {
        setPlayers(prev => prev.map(p => {
          if (p.id === playerId) {
            return { ...p, score: correct ? p.score + 10 : p.score };
          }
          return p;
        }));
        setRoundScoresRecorded(prev => ({...prev, [playerId]: true}));
      };

      const addPlayer = () => {
        setPlayers(prev => [
          ...prev,
          {
            id: `p${Date.now()}`,
            name: `玩家 ${prev.length + 1}`,
            avatar: '',
            score: 0,
            isCurrentUser: true
          }
        ]);
      };

      const removePlayer = (id) => {
        if (players.length > 1) {
          setPlayers(prev => prev.filter(p => p.id !== id));
        }
      };

      const updatePlayerName = (id, name) => {
        setPlayers(prev => prev.map(p => p.id === id ? { ...p, name } : p));
      };

      const allPlayersScored = players.every(p => roundScoresRecorded[p.id]);

      if (gameState === 'standby') {
        return (
          <div className="flex flex-col h-full bg-white font-sans p-6 overflow-hidden">
            <div className="text-center mt-4 mb-4">
              <div className="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-2 animate-bounce">
                <Play size={32} fill="currentColor" />
              </div>
              <h1 className="text-2xl font-black text-slate-800">准备开始</h1>
            </div>

            <div className="flex-1 overflow-y-auto mb-4 space-y-3 px-2 no-scrollbar">
               {players.map((p, index) => (
                 <div key={p.id} className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border-2 border-slate-100 shadow-sm">
                   <div className="w-6 h-6 flex items-center justify-center bg-slate-200 text-slate-500 rounded-full font-bold text-xs">
                     {index + 1}
                   </div>
                   <input 
                      type="text" 
                      value={p.name}
                      onChange={(e) => updatePlayerName(p.id, e.target.value)}
                      className="flex-1 bg-white border-2 border-slate-200 focus:border-green-400 outline-none text-slate-800 px-3 py-1.5 rounded-xl font-bold text-sm"
                      placeholder="输入名字"
                   />
                   {players.length > 1 && (
                     <button onClick={() => removePlayer(p.id)} className="p-2 text-red-400 hover:text-red-500 bg-red-50 rounded-xl">
                       <X size={16} />
                     </button>
                   )}
                 </div>
               ))}
               
               <button 
                 onClick={addPlayer} 
                 className="w-full mt-2 py-3 border-2 border-dashed border-slate-300 text-slate-400 rounded-2xl hover:border-green-400 hover:text-green-500 hover:bg-green-50 font-bold flex justify-center items-center gap-2 transition text-sm"
               >
                 + 添加玩家
               </button>
            </div>

            <button 
              onClick={() => setGameState('playing')}
              className="w-full py-4 bg-green-500 text-white text-lg font-black rounded-3xl shadow-xl shadow-green-200 hover:bg-green-600 active:scale-95 transition-transform"
            >
              🚀 开始游戏
            </button>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-full bg-slate-50 font-sans overflow-hidden">
          {/* Top Bar */}
          <div className="flex justify-between items-center p-4 bg-white shadow-sm rounded-b-3xl z-10 shrink-0">
            <div className="flex items-center gap-2">
               <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold border border-slate-200">
                 第 {songIndex + 1} / {totalSongs} 题
               </span>
            </div>
            <button onClick={onEndGame} className="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-full border border-red-100">
              结束游戏
            </button>
          </div>

          {/* Players Chips */}
          <div className="py-2 overflow-x-auto no-scrollbar shrink-0 z-10 px-4">
            <div className="flex items-center gap-2 min-w-max">
              {players.map((p) => (
                 <div key={p.id} className="flex flex-col items-center min-w-[50px] bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                    <div className="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-lg mb-1">
                       {p.avatar ? <img src={p.avatar} alt="" className="w-full h-full rounded-full"/> : '👤'}
                    </div>
                    <span className="text-[10px] font-bold text-slate-500 truncate w-full text-center">{p.name}</span>
                    <span className="text-[10px] font-black text-green-500">{p.score}</span>
                 </div>
              ))}
            </div>
          </div>

          {/* Main Game */}
          <div className="flex-1 flex flex-col items-center justify-evenly p-4 w-full">
            
            <div className={`relative w-40 h-40 sm:w-56 sm:h-56 rounded-full border-4 border-white shadow-2xl flex items-center justify-center overflow-hidden transition-all duration-700 shrink-0 ${isPlaying ? 'animate-spin-slow' : ''}`}>
               <div className="absolute inset-0 bg-slate-800"></div>
               <div className="absolute inset-2 border border-slate-700 rounded-full opacity-30"></div>
               <div className="absolute inset-6 border border-slate-700 rounded-full opacity-30"></div>
               <div className="absolute inset-10 border border-slate-700 rounded-full opacity-30"></div>
               
               <div className={`absolute w-16 h-16 sm:w-20 sm:h-20 rounded-full flex items-center justify-center z-20 shadow-inner transition-colors duration-300 ${isCountingDown && !isRevealed ? 'bg-orange-500' : 'bg-green-400'}`}>
                  {isRevealed ? (
                     <img src={currentSong.cover} alt="Cover" className="w-full h-full rounded-full object-cover" />
                  ) : (
                    <>
                       {isCountingDown ? (
                         <div className="flex flex-col items-center justify-center">
                            <span className="text-white font-black text-xl sm:text-2xl animate-pulse">{countdown}</span>
                         </div>
                       ) : (
                         <span className="text-2xl font-black text-white">?</span>
                       )}
                    </>
                  )}
               </div>
            </div>

            <div className="w-full h-8 flex items-end justify-center opacity-60 shrink-0">
              <Visualizer isPlaying={isPlaying} />
            </div>

            <div className="w-full max-w-xs bg-white p-4 rounded-[1.5rem] shadow-xl shadow-slate-200/50 space-y-2 shrink-0 relative">
              <div className="relative pt-1">
                <input
                  type="range"
                  min="0"
                  max={maxDuration}
                  step="0.1"
                  value={progress}
                  onChange={handleSliderChange}
                  disabled={!hasFinishedFirstPlay} 
                  className={`w-full h-2 rounded-full appearance-none ${!hasFinishedFirstPlay ? 'bg-slate-200 cursor-not-allowed' : 'bg-slate-100 cursor-pointer accent-green-500'}`}
                />
                {!hasFinishedFirstPlay && (
                  <div className="absolute inset-0 -top-2 flex items-center justify-center pointer-events-none">
                     <span className="text-[9px] font-bold text-slate-400 bg-white/90 px-2 py-0.5 rounded-full backdrop-blur-sm shadow-sm flex items-center gap-1 border border-slate-100">
                       <Lock size={8} /> 播放完解锁
                     </span>
                  </div>
                )}
              </div>
              
              <div className="flex justify-between text-[10px] font-bold text-slate-400">
                <span>{Math.floor(progress)}s</span>
                <span>{maxDuration}s</span>
              </div>

              <div className="flex justify-center gap-6 items-center pt-1">
                <button 
                  onClick={handleReplay} 
                  disabled={!hasFinishedFirstPlay}
                  className={`p-2.5 rounded-full transition ${!hasFinishedFirstPlay ? 'bg-slate-50 text-slate-300' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 active:scale-95'}`}
                >
                  <RotateCcw size={18} />
                </button>
                
                <button 
                  onClick={togglePlay} 
                  className="p-3.5 bg-green-500 rounded-full text-white shadow-lg shadow-green-200 hover:bg-green-600 active:scale-95 transition transform"
                >
                  {isPlaying ? <Pause size={24} fill="currentColor" /> : <Play size={24} fill="currentColor" />}
                </button>
              </div>
            </div>
          </div>

          {/* Bottom Reveal/Score Sheet */}
          <div className="p-4 bg-white/50 backdrop-blur-sm shrink-0 flex justify-center pb-safe">
            {!isRevealed ? (
                <button 
                onClick={() => setIsRevealed(true)}
                className="px-6 py-3 bg-yellow-400 text-yellow-900 font-bold rounded-full shadow-lg hover:bg-yellow-500 flex items-center gap-2 text-sm active:scale-95 transition-transform"
                >
                <Eye size={18} /> {isCountingDown ? '提前查看' : '查看答案'}
                </button>
            ) : null}
          </div>

          {isRevealed && (
              <div className="absolute inset-0 z-50 flex flex-col justify-end bg-black/20 backdrop-blur-[1px]">
                <div className="bg-white rounded-t-[2rem] shadow-2xl h-[70vh] flex flex-col animate-fadeIn">
                    <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-[2rem]">
                        <div className="flex-1">
                            <h3 className="text-lg font-black text-slate-800">《{currentSong.title}》</h3>
                            <p className="text-xs font-bold text-slate-400">{ARTISTS.find(a => a.id === currentSong.artistId)?.name}</p>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar">
                        {players.map(p => (
                            <div key={p.id} className="flex items-center justify-between bg-white p-2.5 pr-2 rounded-xl border border-slate-100 shadow-sm">
                                <span className="font-bold text-slate-700 text-sm pl-2">{p.name}</span>
                                
                                {roundScoresRecorded[p.id] ? (
                                    <span className={`text-[10px] px-2 py-1 rounded-full font-bold flex items-center gap-1 ${players.find(pl => pl.id === p.id)?.score && players.find(pl => pl.id === p.id).score % 10 === 0 && roundScoresRecorded[p.id] ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-500'}`}>
                                        {players.find(pl => pl.id === p.id)?.score && players.find(pl => pl.id === p.id).score % 10 === 0 && roundScoresRecorded[p.id] ? '正确' : '错误'}
                                    </span>
                                ) : (
                                    <div className="flex gap-2">
                                        <button onClick={() => handleScore(p.id, true)} className="w-8 h-8 flex items-center justify-center bg-green-100 text-green-600 rounded-lg active:scale-95"><Check size={16} /></button>
                                        <button onClick={() => handleScore(p.id, false)} className="w-8 h-8 flex items-center justify-center bg-red-100 text-red-500 rounded-lg active:scale-95"><X size={16} /></button>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    <div className="p-4 border-t border-slate-100 pb-safe">
                        {allPlayersScored ? (
                            <button 
                                onClick={songIndex + 1 >= totalSongs ? onEndGame : onNextSong}
                                className="w-full py-3 bg-blue-500 text-white text-base font-bold rounded-2xl shadow-lg shadow-blue-200 flex items-center justify-center gap-2 active:scale-95 transition-transform"
                            >
                                {songIndex + 1 >= totalSongs ? '查看结果' : '下一题'} <ArrowRight size={18}/>
                            </button>
                        ) : (
                             <div className="text-center py-3 bg-slate-100 rounded-2xl text-slate-400 font-bold text-xs">
                                请记录所有玩家得分
                            </div>
                        )}
                    </div>
                </div>
              </div>
          )}
        </div>
      );
    };

    // OnlineGameScreen
    const OnlineGameScreen = ({
      settings,
      players,
      setPlayers,
      currentSong,
      songIndex,
      totalSongs,
      onNextSong,
      onEndGame
    }) => {
      const [hasGameStarted, setHasGameStarted] = useState(false);
      const [isPlaying, setIsPlaying] = useState(false);
      const [messages, setMessages] = useState([]);
      const [inputVal, setInputVal] = useState('');
      const [progress, setProgress] = useState(0);
      
      const [hasFinishedFirstPlay, setHasFinishedFirstPlay] = useState(false);
      const [countdown, setCountdown] = useState(0);
      const [isCountingDown, setIsCountingDown] = useState(false);

      const messagesEndRef = useRef(null);
      const timerRef = useRef(null);
      const countdownRef = useRef(null);

      const maxDuration = settings.isFullSong ? 180 : settings.durationSeconds;
      const isHost = players.find(p => p.isCurrentUser)?.id === players[0]?.id; 

      useEffect(() => {
        if (songIndex === 0) {
          setMessages([{
            id: 'sys-start',
            playerId: 'system',
            playerName: 'System',
            text: '等待房主开始游戏...',
            type: 'system'
          }]);
        }
      }, [songIndex]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      useEffect(() => {
        setHasGameStarted(false);
        setIsPlaying(false);
        setProgress(0);
        setHasFinishedFirstPlay(false);
        setIsCountingDown(false);
        setCountdown(settings.timeLimit > 0 ? settings.timeLimit : 0);
        
        setPlayers(prev => prev.map(p => ({ ...p, status: 'answering' })));
        
        setMessages(prev => [...prev, {
          id: Date.now().toString(),
          playerId: 'system',
          playerName: 'System',
          text: `🎵 准备播放第 ${songIndex + 1} 首`,
          type: 'system'
        }]);

        stopTimer();
        stopCountdown();
      }, [currentSong]);

      useEffect(() => {
        if (isPlaying) {
          timerRef.current = window.setInterval(() => {
            setProgress((prev) => {
              if (prev >= maxDuration) {
                handlePlaybackFinish();
                return maxDuration;
              }
              return prev + 0.1;
            });
          }, 100);
        } else {
          stopTimer();
        }
        return () => stopTimer();
      }, [isPlaying, maxDuration]);

      useEffect(() => {
        if (isCountingDown && countdown > 0) {
          countdownRef.current = window.setInterval(() => {
            setCountdown((prev) => {
              if (prev <= 1) {
                stopCountdown();
                setIsCountingDown(false);
                setMessages(m => [...m, {
                    id: `timeup-${Date.now()}`,
                    playerId: 'system',
                    playerName: 'System',
                    text: '⏰ 时间到！',
                    type: 'system'
                }]);
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        } else {
          stopCountdown();
        }
        return () => stopCountdown();
      }, [isCountingDown, countdown]);

      const stopTimer = () => {
        if (timerRef.current) clearInterval(timerRef.current);
      };

      const stopCountdown = () => {
        if (countdownRef.current) clearInterval(countdownRef.current);
      };

      const handlePlaybackFinish = () => {
        setIsPlaying(false);
        if (!hasFinishedFirstPlay) {
            setHasFinishedFirstPlay(true);
            if (settings.timeLimit > 0) {
                setIsCountingDown(true);
            }
        }
      };

      const handleHostStart = () => {
        setHasGameStarted(true);
        setIsPlaying(true);
        setMessages(prev => [...prev, {
          id: Date.now().toString(),
          playerId: 'system',
          playerName: 'System',
          text: '🎮 游戏开始！请听歌猜名！',
          type: 'system'
        }]);
      };

      const handleSendMessage = (e) => {
        e.preventDefault();
        if (!inputVal.trim()) return;

        const isCorrect = inputVal.toLowerCase().includes(currentSong.title.toLowerCase());
        const currentUser = players.find(p => p.isCurrentUser);

        const newMessage = {
          id: Date.now().toString(),
          playerId: currentUser?.id || 'unknown',
          playerName: currentUser?.name || '我',
          text: inputVal,
          type: 'user'
        };

        setMessages(prev => [...prev, newMessage]);
        setInputVal('');

        if (isCorrect && hasGameStarted) {
          setTimeout(() => {
            setMessages(prev => [...prev, {
              id: Date.now().toString(),
              playerId: 'system',
              playerName: 'System',
              text: `🎉 ${currentUser?.name} 猜对了！歌名是《${currentSong.title}》`,
              type: 'correct'
            }]);
            
            setPlayers(prev => prev.map(p => p.isCurrentUser ? { ...p, score: p.score + 20 } : p));
          }, 500);
        }
      };

      const handleInvite = () => {
        alert("邀请链接已复制到剪贴板！(模拟分享)");
        setTimeout(() => {
          const newId = `p${Date.now()}`;
          setPlayers(prev => {
            if (prev.length >= 4) return prev;
            const newPlayer = {
              id: newId,
              name: `路人 ${prev.length}`,
              avatar: `https://picsum.photos/seed/${newId}/100/100`,
              score: 0,
              isCurrentUser: false
            };
            setMessages(curr => [...curr, {
              id: `join-${newId}`,
              playerId: 'system',
              playerName: 'System',
              text: `👋 ${newPlayer.name} 加入了房间`,
              type: 'system'
            }]);
            return [...prev, newPlayer];
          });
        }, 2000);
      };

      const handleExitRoom = () => {
        if (window.confirm("确定要退出房间吗？")) {
            const remainingPlayers = players.filter(p => !p.isCurrentUser);
            
            if (remainingPlayers.length === 0) {
                onEndGame(); 
            } else {
                onEndGame();
            }
        }
      };

      const handleSliderChange = (e) => {
        if (!hasGameStarted || !hasFinishedFirstPlay) return;
        setProgress(parseFloat(e.target.value));
      };

      return (
        <div className="flex flex-col h-full bg-slate-50 font-sans">
          
          <div className="bg-white p-3 shadow-sm flex justify-between items-center rounded-b-3xl z-20 shrink-0">
            <div className="flex items-center gap-2">
                <button 
                    onClick={handleExitRoom}
                    className="bg-red-50 text-red-500 p-2 rounded-full active:scale-95 hover:bg-red-100"
                >
                    <LogOut size={16} />
                </button>
                <div className="flex flex-col">
                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Room #8821</span>
                    <span className="font-black text-slate-800 text-sm">第 {songIndex + 1}/{totalSongs} 首</span>
                </div>
            </div>
            <button onClick={handleInvite} className="bg-green-100 hover:bg-green-200 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1 transition-colors">
              <Share2 size={14} /> 邀请
            </button>
          </div>

          <div className="bg-slate-50 border-b border-slate-100 overflow-x-auto p-3 flex gap-3 shrink-0 min-h-[90px] items-center no-scrollbar">
            {players.map(p => (
              <div key={p.id} className="flex flex-col items-center min-w-[56px] relative group">
                <div className="relative transform transition-transform group-hover:scale-110">
                  <img src={p.avatar} alt={p.name} className="w-10 h-10 rounded-full border-2 border-white shadow-md object-cover" />
                  <div className="absolute -top-2 -right-1 bg-yellow-400 text-white p-0.5 rounded-full shadow-sm border border-white">
                    {players.indexOf(p) === 0 ? <Crown size={8} /> : null}
                  </div>
                  <div className="absolute -bottom-2 -right-1 bg-green-500 text-white text-[9px] font-bold px-1.5 rounded-full border border-white shadow-sm">
                    {p.score}
                  </div>
                </div>
                <span className="text-[9px] font-bold text-slate-500 mt-1 truncate max-w-[60px]">{p.name}</span>
              </div>
            ))}
          </div>

          <div className="mx-4 mt-2 bg-white rounded-2xl p-3 shadow-lg shadow-slate-200/50 z-10 shrink-0 border border-slate-100 relative">
            <div className="flex items-center gap-3">
              <button 
                 onClick={() => hasGameStarted && setIsPlaying(!isPlaying)} 
                 disabled={!hasGameStarted}
                 className={`p-2.5 rounded-full shadow-md active:scale-95 transition flex-shrink-0 ${hasGameStarted ? 'bg-gradient-to-br from-purple-500 to-purple-600 text-white' : 'bg-slate-100 text-slate-300'}`}
              >
                {isPlaying ? <Pause size={18} fill="currentColor"/> : <Play size={18} fill="currentColor"/>}
              </button>
              
              <div className="flex-1 overflow-hidden relative h-8 flex items-end opacity-50 justify-center">
                 {isCountingDown ? (
                     <div className="flex items-center gap-2 text-orange-500 font-black animate-pulse">
                        <Clock size={16} /> 倒计时: {countdown}s
                     </div>
                 ) : (
                    <Visualizer isPlaying={isPlaying} />
                 )}
              </div>
            </div>
            
            <div className="flex items-center gap-2 pt-2 relative">
               <span className="text-[9px] font-bold text-slate-400 w-6 text-right">{Math.floor(progress)}s</span>
               <div className="flex-1 relative">
                    <input
                        type="range"
                        min="0"
                        max={maxDuration}
                        step="0.1"
                        value={progress}
                        onChange={handleSliderChange}
                        disabled={!hasGameStarted || !hasFinishedFirstPlay}
                        className={`w-full h-1.5 rounded-lg appearance-none ${(!hasGameStarted || !hasFinishedFirstPlay) ? 'bg-slate-200 cursor-not-allowed' : 'bg-slate-100 accent-purple-500 cursor-pointer'}`}
                    />
                    {!hasFinishedFirstPlay && hasGameStarted && (
                         <div className="absolute top-[-15px] left-1/2 -translate-x-1/2">
                            <span className="text-[8px] flex items-center gap-1 text-slate-400 bg-white/80 px-1.5 rounded-full border border-slate-100"><Lock size={6}/> 播放完解锁</span>
                         </div>
                    )}
               </div>
               <span className="text-[9px] font-bold text-slate-400 w-6">{maxDuration}s</span>
            </div>

            {isHost && !hasGameStarted && (
              <div className="absolute inset-0 bg-white/90 backdrop-blur-sm rounded-2xl flex items-center justify-center z-20">
                 <button 
                  onClick={handleHostStart}
                  className="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 px-5 py-2 rounded-full text-xs font-black shadow-lg shadow-yellow-200 animate-pulse flex items-center gap-2 transform transition hover:scale-105"
                >
                  <PlayCircle size={16} /> 房主开始游戏
                </button>
              </div>
            )}
          </div>
          
          {isHost && hasGameStarted && (
             <div className="flex justify-center mt-2 shrink-0">
                 <button 
                   onClick={songIndex + 1 >= totalSongs ? onEndGame : onNextSong}
                   className="text-[10px] bg-slate-200 hover:bg-slate-300 text-slate-600 px-3 py-1 rounded-full font-bold transition-colors"
                 >
                   {songIndex + 1 >= totalSongs ? '结束游戏' : '⏭ 跳过本题'}
                 </button>
             </div>
          )}

          <div className="flex-1 overflow-y-auto px-4 py-2 space-y-3 no-scrollbar">
            {messages.map(msg => {
              if (msg.type === 'system') {
                return (
                  <div key={msg.id} className="flex justify-center my-2">
                    <span className="bg-slate-200 text-slate-500 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide">{msg.text}</span>
                  </div>
                );
              }
              if (msg.type === 'correct') {
                return (
                  <div key={msg.id} className="flex justify-center my-2 w-full">
                    <div className="bg-gradient-to-r from-yellow-100 to-orange-100 border border-yellow-200 text-yellow-800 font-bold text-xs px-4 py-2 rounded-xl shadow-sm animate-bounce text-center">
                      {msg.text}
                    </div>
                  </div>
                );
              }
              const isMe = msg.playerId === players.find(p => p.isCurrentUser)?.id;
              return (
                <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'} animate-popIn`}>
                  <div className={`max-w-[85%] px-3 py-2 text-sm font-medium shadow-sm break-words relative ${
                    isMe 
                    ? 'bg-green-500 text-white rounded-2xl rounded-tr-sm' 
                    : 'bg-white text-slate-800 rounded-2xl rounded-tl-sm border border-slate-100'
                  }`}>
                    {!isMe && <p className="text-[9px] font-bold text-slate-400 mb-0.5">{msg.playerName}</p>}
                    {msg.text}
                  </div>
                </div>
              );
            })}
            <div ref={messagesEndRef} />
          </div>

          <form onSubmit={handleSendMessage} className="bg-white p-2 shadow-up border-t border-slate-50 flex gap-2 shrink-0 pb-safe z-20">
            <div className="flex-1 relative">
               <input
                type="text"
                value={inputVal}
                onChange={(e) => setInputVal(e.target.value)}
                placeholder={hasGameStarted ? "猜猜是哪首歌..." : "等待中..."}
                className="w-full bg-slate-100 text-slate-800 rounded-full pl-4 pr-9 py-2.5 font-bold focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white transition-all placeholder-slate-400 text-sm"
                disabled={!hasGameStarted}
              />
              <Mic className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4" />
            </div>
            <button 
              type="submit" 
              className="bg-green-500 text-white w-10 h-10 rounded-full shadow-lg shadow-green-200 hover:bg-green-600 disabled:opacity-50 disabled:shadow-none transition-all flex items-center justify-center active:scale-95" 
              disabled={!inputVal.trim() || !hasGameStarted}
            >
              <Send size={18} className="ml-0.5" />
            </button>
          </form>
        </div>
      );
    };

    // ResultsScreen
    const ResultsScreen = ({ players, onRestart, onHome }) => {
      const sortedPlayers = [...players].sort((a, b) => b.score - a.score);

      return (
        <div className="flex flex-col h-full bg-slate-50 overflow-y-auto no-scrollbar">
          <div className="bg-green-500 pt-16 pb-20 rounded-b-[3rem] shadow-lg relative overflow-hidden shrink-0">
            <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
               <div className="absolute top-10 left-10 w-20 h-20 bg-white rounded-full"></div>
               <div className="absolute bottom-10 right-10 w-32 h-32 bg-white rounded-full"></div>
            </div>
            
            <div className="text-center relative z-10">
              <div className="inline-block p-4 bg-white/20 rounded-full backdrop-blur-sm mb-4">
                 <Trophy size={64} className="text-yellow-300 animate-bounce" />
              </div>
              <h1 className="text-3xl font-black text-white tracking-tight">游戏结束!</h1>
              <p className="text-green-100 font-bold mt-1">最终排行榜</p>
            </div>
          </div>

          <div className="flex-1 px-6 -mt-12 relative z-20 pb-10">
            <div className="space-y-4">
              {sortedPlayers.map((player, index) => (
                <div 
                  key={player.id} 
                  className={`flex items-center p-4 rounded-3xl shadow-sm border-2 transition-transform hover:scale-105 ${
                    index === 0 
                    ? 'bg-white border-yellow-400 shadow-yellow-100' 
                    : 'bg-white border-slate-100'
                  }`}
                >
                  <div className={`w-10 h-10 flex items-center justify-center rounded-full font-black text-lg mr-4 ${
                    index === 0 ? 'bg-yellow-400 text-yellow-900' : 
                    index === 1 ? 'bg-slate-300 text-slate-600' : 
                    index === 2 ? 'bg-orange-300 text-orange-800' : 'bg-slate-100 text-slate-400'
                  }`}>
                    {index + 1}
                  </div>
                  
                  <img src={player.avatar || `https://picsum.photos/seed/${player.id}/100/100`} alt={player.name} className="w-12 h-12 rounded-full mr-3 object-cover border-2 border-slate-100" />
                  
                  <div className="flex-1">
                    <h3 className="font-bold text-lg text-slate-800">{player.name}</h3>
                    {index === 0 && <span className="inline-block bg-yellow-100 text-yellow-700 text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">MVP</span>}
                  </div>
                  
                  <div className="text-2xl font-black text-slate-800">
                    {player.score} <span className="text-xs font-bold text-slate-400">pts</span>
                  </div>
                </div>
              ))}
            </div>

            <div className="mt-12 space-y-4">
              <button 
                onClick={onRestart}
                className="w-full py-5 bg-green-500 text-white font-black rounded-3xl shadow-xl shadow-green-200 active:scale-95 transition flex justify-center items-center gap-2 text-lg"
              >
                 <RotateCcw strokeWidth={3} /> 再玩一次
              </button>
              <button 
                onClick={onHome}
                className="w-full py-5 bg-white text-slate-400 font-bold rounded-3xl border-2 border-slate-100 hover:bg-slate-50 hover:text-slate-600 active:scale-95 transition flex justify-center items-center gap-2"
              >
                <Home strokeWidth={3} /> 返回首页
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- 4. Main App Container ---

    const App = () => {
      const [screen, setScreen] = useState('setup');
      
      const [settings, setSettings] = useState({
        mode: GameMode.LOCAL,
        selectedArtistIds: ['1'],
        durationSeconds: 15,
        isFullSong: false,
        playbackPosition: PlaybackPosition.RANDOM,
        questionCount: 5,
        timeLimit: 30,
        playerCount: 1,
      });

      const [gameSongs, setGameSongs] = useState([]);
      const [currentSongIndex, setCurrentSongIndex] = useState(0);
      const [players, setPlayers] = useState([]);

      const prepareSongs = () => {
        const filteredSongs = SONGS.filter(s => settings.selectedArtistIds.includes(s.artistId));
        const shuffled = [...filteredSongs].sort(() => 0.5 - Math.random()).slice(0, settings.questionCount);
        
        if (shuffled.length === 0) {
          alert("所选歌手没有找到歌曲！");
          return null;
        }
        return shuffled;
      };

      const handleStartGame = () => {
        const shuffled = prepareSongs();
        if (!shuffled) return;

        setGameSongs(shuffled);
        setCurrentSongIndex(0);

        if (settings.mode === GameMode.LOCAL) {
          setPlayers([{
            id: 'p1',
            name: '玩家 1',
            avatar: `https://picsum.photos/seed/p1/100/100`,
            score: 0,
            isCurrentUser: true
          }]);
        } else {
          setPlayers([
            { id: 'me', name: '我 (房主)', avatar: 'https://picsum.photos/seed/me/100/100', score: 0, isCurrentUser: true }
          ]);
        }

        setScreen('game');
      };

      const handleJoinGame = (roomId) => {
        const shuffled = prepareSongs(); 
        if (!shuffled) return;

        setGameSongs(shuffled);
        setCurrentSongIndex(0);
        setSettings(prev => ({ ...prev, mode: GameMode.ONLINE }));

        setPlayers([
          { id: 'host', name: '房主', avatar: 'https://picsum.photos/seed/host/100/100', score: 0, isCurrentUser: false },
          { id: 'me', name: '我', avatar: 'https://picsum.photos/seed/me_join/100/100', score: 0, isCurrentUser: true }
        ]);

        setScreen('game');
      };

      const handleNextSong = () => {
        if (currentSongIndex < gameSongs.length - 1) {
          setCurrentSongIndex(prev => prev + 1);
        } else {
          setScreen('results');
        }
      };

      const handleEndGame = () => {
        setScreen('results');
      };

      const handleRestart = () => {
        setPlayers(prev => prev.map(p => ({ ...p, score: 0 })));
        const shuffled = prepareSongs();
        if (shuffled) {
          setGameSongs(shuffled);
          setCurrentSongIndex(0);
          setScreen('game');
        }
      };

      const handleHome = () => {
        setScreen('setup');
      };

      return (
        <div className="w-full h-screen flex justify-center items-center font-sans">
          {/* Mobile Container Simulator */}
          <div className="w-full max-w-md h-full bg-white shadow-2xl overflow-hidden relative sm:rounded-[2.5rem] sm:h-[92vh] sm:border-8 sm:border-slate-200 ring-1 ring-slate-900/5">
            
            {screen === 'setup' && (
              <SetupScreen 
                settings={settings} 
                setSettings={setSettings} 
                onStart={handleStartGame}
                onJoin={handleJoinGame}
                maxSongs={SONGS.length}
              />
            )}

            {screen === 'game' && settings.mode === GameMode.LOCAL && (
              <LocalGameScreen
                settings={settings}
                players={players}
                setPlayers={setPlayers}
                currentSong={gameSongs[currentSongIndex]}
                songIndex={currentSongIndex}
                totalSongs={gameSongs.length}
                onNextSong={handleNextSong}
                onEndGame={handleEndGame}
              />
            )}

            {screen === 'game' && settings.mode === GameMode.ONLINE && (
              <OnlineGameScreen
                settings={settings}
                players={players}
                setPlayers={setPlayers}
                currentSong={gameSongs[currentSongIndex]}
                songIndex={currentSongIndex}
                totalSongs={gameSongs.length}
                onNextSong={handleNextSong}
                onEndGame={handleEndGame}
              />
            )}

            {screen === 'results' && (
              <ResultsScreen 
                players={players}
                onRestart={handleRestart}
                onHome={handleHome}
              />
            )}

          </div>
        </div>
      );
    };

    // --- 5. Bootstrapper ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
